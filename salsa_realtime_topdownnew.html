<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1"><title>SALSA — real-time social reaction</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Space+Mono:wght@400;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f6f8;--panel:#ffffff;--line:#e4e7ec;--ink:#16181c;--muted:#8B94A8;--faint:#5B6478;
--indigo:#6E8BFF;--green:#3BE08F;--coral:#FF6B5E;--amber:#FFC24B;
--disp:'Space Grotesk',system-ui,sans-serif;--mono:'Space Mono',monospace;--body:'Inter',system-ui,sans-serif;}
*{box-sizing:border-box}body{margin:0;background:var(--bg);
color:var(--ink);font-family:var(--body);min-height:auto;display:flex;align-items:center;justify-content:center;padding:40px 20px;-webkit-font-smoothing:antialiased}
.stage{width:100%;max-width:860px}
.eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:var(--indigo);margin:0 0 12px;font-weight:700}
h1{font-family:var(--disp);font-weight:600;font-size:clamp(22px,3.6vw,30px);line-height:1.18;margin:0 0 10px}
.sub{color:var(--muted);max-width:620px;margin:0 0 14px;font-size:15px;line-height:1.6}
.banner{font-family:var(--mono);font-size:12.5px;color:#6E8BFF;border:1px solid #e4e7ec;background:#eceff4;border-radius:10px;padding:9px 13px;margin:0 0 14px;display:inline-block}
.banner b{color:#16181c}
.card{background:var(--panel);border:1px solid var(--line);border-radius:18px;overflow:hidden}
.scenarios{display:flex;gap:8px;flex-wrap:wrap;padding:14px 16px 0}
.scenarios button{background:#eceff4;border:1px solid var(--line);color:var(--muted);font-family:var(--disp);font-weight:600;font-size:13px;padding:8px 13px;border-radius:9px;cursor:pointer}
.scenarios button.on{background:var(--indigo);color:#f5f6f8;border-color:var(--indigo)}
.viewer{position:relative;width:100%;max-width:420px;margin:10px auto 0;background:#f5f6f8;line-height:0;touch-action:none}
#sim{width:100%;height:auto;display:block}#sim.free{cursor:grab}#sim.grab{cursor:grabbing}
#goal{cursor:grab}#sim.grab #goal{cursor:grabbing}
.hud{position:absolute;left:12px;top:12px;display:flex;flex-direction:column;gap:7px;pointer-events:none}
.chip{font-family:var(--mono);font-size:11.5px;background:rgba(16,20,29,.92);backdrop-filter:blur(5px);border:1px solid rgba(255,255,255,.16);border-radius:9px;padding:6px 10px;color:#BFC6D4;width:fit-content;max-width:215px}
.chip b{color:#FFFFFF;font-weight:700;font-size:12.5px}.state{font-family:var(--disp);font-weight:700;font-size:13.5px}
.bar{display:flex;gap:14px;align-items:center;flex-wrap:wrap;padding:14px 18px 18px}
.toggle{display:flex;border:1px solid var(--line);border-radius:11px;overflow:hidden}
.toggle button{background:transparent;color:var(--muted);border:none;cursor:pointer;font-family:var(--disp);font-weight:600;font-size:14px;padding:9px 15px;border-right:1px solid var(--line)}
.toggle button:last-child{border-right:none}
.toggle button.on[data-m="salsa"]{background:var(--indigo);color:#f5f6f8}.toggle button.on[data-m="base"]{background:var(--coral);color:#f5f6f8}
.hint{font-family:var(--mono);font-size:12px;color:var(--muted);flex:1;min-width:200px}
.note{font-family:var(--mono);font-size:11px;color:var(--faint);margin-top:14px;text-align:center}
</style></head><body><div class="stage">
<p class="eyebrow">SALSA · real-time closed loop</p>
<h1>The aligned policy, in a live closed loop.</h1>
<p class="sub">This is SALSA end-to-end: it drives toward its goal and reacts to people continuously, in real time. <b>Pick a scenario</b>, then drag the green goal and watch it re-route live.</p>

  okN=0;failN=0;outcome='';swerved=false;life=0;robot={x:START.x,y:START.y};trailPts=[];
  if(sname==='headon')ped={x:240,y:90};else if(sname==='overtaking')ped={x:240,y:360};
  else if(sname==='sudden')ped={x:112,y:232};else if(sname==='static')ped={x:240,y:250};else ped={x:300,y:300};
  pedlbl.textContent=(sname==='free')?'drag me':'';}
document.querySelectorAll('.scenarios button').forEach(b=>b.addEventListener('click',()=>setScen(b.dataset.s)));
// drag (goal in any scenario; pedestrian in free mode)
let dragTarget=null;
function pt(e){const r=svg.getBoundingClientRect();const cx=(e.touches?e.touches[0].clientX:e.clientX),cy=(e.touches?e.touches[0].clientY:e.clientY);return{x:(cx-r.left)/r.width*480,y:(cy-r.top)/r.height*560};}
function down(e){const p=pt(e);
  if(Math.hypot(p.x-GOAL.x,p.y-GOAL.y)<28){dragTarget='goal';dragging=true;svg.classList.add('grab');e.preventDefault();return;}
  if(scen==='free'){dragTarget='ped';dragging=true;svg.classList.add('grab');ped=p;clampPed();e.preventDefault();return;}
}
function mv(e){if(!dragging)return;const p=pt(e);
  if(dragTarget==='goal'){GOAL.x=p.x;GOAL.y=p.y;clampGoal();}
  else if(dragTarget==='ped'){ped=p;clampPed();}
  e.preventDefault();}
function up(){dragging=false;dragTarget=null;svg.classList.remove('grab');}
function clampPed(){ped.x=Math.max(16,Math.min(464,ped.x));ped.y=Math.max(16,Math.min(544,ped.y));}
function clampGoal(){GOAL.x=Math.max(80,Math.min(400,GOAL.x));GOAL.y=Math.max(16,Math.min(470,GOAL.y));}
svg.addEventListener('mousedown',down);window.addEventListener('mousemove',mv);window.addEventListener('mouseup',up);
svg.addEventListener('touchstart',down,{passive:false});window.addEventListener('touchmove',mv,{passive:false});window.addEventListener('touchend',up);
// scenario-scripted pedestrian motion
function scriptPed(dt){
  if(scen==='headon'){ped.x=240;ped.y+=52*dt;if(ped.y>548){ped.y=60;}}
  else if(scen==='overtaking'){ped.x=240;ped.y-=20*dt;if(ped.y<48){ped.y=420;}}
  else if(scen==='sudden'){const trig=(robot.y<ped.y+140&&robot.y>ped.y-30);
    const target=trig?240:112;ped.x+=(target-ped.x)*Math.min(1,dt*6);}
  else if(scen==='static'){ped.x=240;ped.y=250;}
}
let last=performance.now();
function step(now){
  const dt=Math.min((now-last)/1000,0.05);last=now;const P=params();
  if(scen!=='free')scriptPed(dt);
  let gx=GOAL.x-robot.x,gy=GOAL.y-robot.y;const gd=Math.hypot(gx,gy)||1;gx/=gd;gy/=gd;
  let goalW=1.0;
  if(mode!=='salsa' && swerved){
    // base: keeps driving FORWARD (upward) but no longer homes on the goal's x -> drifts to one side
    gx=baseSide*0.7; gy=-1.0;            // forward + sideways veer (misses the goal left/right)
    const n=Math.hypot(gx,gy); gx/=n; gy/=n;
  } else { gx*=goalW; gy*=goalW; }
  let ax=robot.x-ped.x,ay=robot.y-ped.y;const pd=Math.hypot(ax,ay)||1;
  let rx=0,ry=0;
  if(pd<P.infl){
    const f=(P.infl-pd)/P.infl*P.strength;
    rx=ax/pd*f; ry=ay/pd*f;
    const nx=ax/pd, ny=ay/pd;
    const align=Math.max(0,-(nx*gx+ny*gy));       // 1 when pedestrian straight ahead
    // choose OPEN side: steer toward road centre (x=240) -> away from nearer curb
    const side = (ped.x>=240? -1 : 1);            // ped on right -> pass on left(toward centre) etc.
    const px=-gy*side, py=gx*side;                // perpendicular to goal dir
    // tangential side-step (scaled per scenario + how head-on)
    const tang=f*P.tang*(0.5+1.0*align);
    rx+=px*tang; ry+=py*tang;
    // parallel hold (overtaking): keep offset alongside instead of merging back early
    if(P.par>0){ rx+=px*f*P.par; ry+=py*f*P.par; }
    // base: clumsy, abrupt, no anticipation -> add a bit of jitter so the late swerve looks rough
    if(P.jitter){ rx+=(Math.random()-0.5)*0.5; ry+=(Math.random()-0.5)*0.5; }
  }
  let vx=gx+rx,vy=gy+ry;const vd=Math.hypot(vx,vy)||1;vx/=vd;vy/=vd;
  // base loses its way after any close encounter -> commits to a side and drifts past the goal
  if(mode!=='salsa' && pd<86){ if(!swerved) baseSide=(ped.x>=240?-1:1); swerved=true; }
  life+=dt;
  let speed=CRUISE,state='NORMAL',col='#3BE08F';
  if(mode==='salsa'){state='AVOID (planning)';col='#6E8BFF';if(pd>P.social){state='NORMAL';col='#3BE08F';}
    if(pd<P.slowR){speed=CRUISE*(0.35+0.65*(pd-P.stopR)/(P.slowR-P.stopR));state='SLOW (fallback)';col='#FFC24B';}
    if(pd<P.stopR){speed=0;state='STOP (fallback)';col='#FF6B5E';}}
  else{ state='reactive (late)'; col='#FFC24B';
    if(pd<26){state='COLLISION / near-miss';col='#FF6B5E';} }
  robot.x+=vx*speed*dt;robot.y+=vy*speed*dt;
  trailPts.push({x:robot.x,y:robot.y});if(trailPts.length>300)trailPts.shift();
  function respawn(){robot={x:START.x,y:START.y};trailPts=[];swerved=false;life=0;}
  // success: reached goal
  if(Math.hypot(GOAL.x-robot.x,GOAL.y-robot.y)<15){okN++;outcome='\u2713 reached';outColor='#3BE08F';respawn();}
  // failure (base): drifted off the road / off-screen / timed out without progress
  const passedGoalLine = (robot.y < GOAL.y+4);                 // driven up to/past the goal's height
  const missedGoal = passedGoalLine && Math.abs(robot.x-GOAL.x) > 22;  // but off to the side -> missed
  const goneTop = (robot.y < -10);
  const timeout = (life>12);
  if(mode!=='salsa' && (missedGoal || goneTop || timeout)){
    failN++;outcome='\u2717 missed';outColor='#FF6B5E';respawn();
  }
  robotEl.setAttribute('transform',`translate(${robot.x.toFixed(1)},${robot.y.toFixed(1)}) rotate(${(Math.atan2(vy,vx)*180/Math.PI+90).toFixed(1)})`);
  pedEl.setAttribute('transform',`translate(${ped.x.toFixed(1)},${ped.y.toFixed(1)})`);
  pedlbl.setAttribute('x',ped.x.toFixed(1));pedlbl.setAttribute('y',(ped.y-30).toFixed(1));
  goalEl.setAttribute('transform',`translate(${GOAL.x.toFixed(1)},${GOAL.y.toFixed(1)})`);
  goallbl.setAttribute('x',GOAL.x.toFixed(1));goallbl.setAttribute('y',(GOAL.y+24).toFixed(1));
  if(P.social>0){ring.setAttribute('cx',ped.x);ring.setAttribute('cy',ped.y);ring.setAttribute('r',P.social);ring.style.display='';}else ring.style.display='none';
  if(trailPts.length>1)trail.setAttribute('d','M'+trailPts.map(p=>`${p.x.toFixed(1)} ${p.y.toFixed(1)}`).join(' L'));
  trail.setAttribute('stroke',mode==='salsa'?'#6E8BFF':'#FF6B5E');
  statev.textContent=state;statev.style.color=col;distv.textContent=(pd/PXM).toFixed(2)+' m';
  spdv.textContent=Math.round(speed/120*100)+'%';
  const ov=document.getElementById('outv'); ov.style.color=outColor;
  ov.textContent=(outcome?outcome+' \u00b7 ':'')+'\u2713'+okN+' \u2717'+failN;
  requestAnimationFrame(step);
}
setMode('salsa');setScen('headon');requestAnimationFrame(step);
</script><script>(function(){var last=0;function H(){var d=document;return Math.max(d.documentElement.scrollHeight,(d.body?d.body.scrollHeight:0),(d.body?d.body.offsetHeight:0));}function P(){var h=H()+2;if(h>last){last=h;try{parent.postMessage({__salsaH:h},'*');}catch(e){}}}window.addEventListener('load',function(){P();setTimeout(P,300);setTimeout(P,1200);setTimeout(P,2500);});try{new ResizeObserver(P).observe(document.documentElement);}catch(e){}var n=0,iv=setInterval(function(){P();if(++n>12)clearInterval(iv);},1000);P();})();</script></body></html>
