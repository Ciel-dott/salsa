<script>
const SX=[150,355,565,775,995], LY=200, START=80;
const dot=document.getElementById('dot'), glow=document.getElementById('glow'), prog=document.getElementById('progress');
const resnode=document.getElementById('resnode'), btn=document.getElementById('ctrl');
const sts=[0,1,2,3,4].map(i=>document.getElementById('st'+i));
const pops=[0,1,2,3,4].map(i=>document.getElementById('pop'+i));
let inLoop=false, paused=false;

function setX(x){dot.setAttribute('cx',x);dot.setAttribute('cy',LY);glow.setAttribute('cx',x);glow.setAttribute('cy',LY);prog.setAttribute('x2',x);}
function seg(x0,x1,dur){return new Promise(r=>{const t0=performance.now();(function f(t){let k=Math.min((t-t0)/dur,1);const e=1-Math.pow(1-k,3);setX(x0+(x1-x0)*e);if(k<1)requestAnimationFrame(f);else r();})(performance.now());});}
const wait=ms=>new Promise(r=>setTimeout(r,ms));

function reset(){
  sts.forEach(s=>s.style.opacity=.28);
  pops.forEach(p=>p.classList.remove('show'));
  resnode.setAttribute('fill','#f5f6f8');
  prog.setAttribute('stroke','#6E8BFF');
  dot.setAttribute('opacity','1'); glow.setAttribute('opacity','.35');
  setX(START);
}

async function onePass(){
  reset();
  let prev=START;
  for(let i=0;i<SX.length;i++){
    await seg(prev, SX[i], i===0?720:620); if(paused) return false;
    sts[i].style.opacity=1; pops[i].classList.add('show');
    const last=(i===SX.length-1);
    if(last){ resnode.setAttribute('fill','#3BE08F'); prog.setAttribute('stroke','#3BE08F'); }
    await wait(last?2500:1950); if(paused) return false;
    if(last){ dot.setAttribute('opacity','0'); glow.setAttribute('opacity','0'); }
    else pops[i].classList.remove('show');
    prev=SX[i];
  }
  await wait(900); if(paused) return false;
  pops[4].classList.remove('show');
  await wait(700);
  return true;
}

async function loopPlay(){
  if(inLoop) return; inLoop=true;
  while(!paused){ const done=await onePass(); if(!done) break; }
  inLoop=false;
}

function setBtn(){ btn.innerHTML = paused ? '&#9654; Play' : '&#10073;&#10073; Pause'; }
function toggle(){ paused=!paused; setBtn(); if(!paused) loopPlay(); }

const rm=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
if(rm){
  sts.forEach(s=>s.style.opacity=1);
  resnode.setAttribute('fill','#3BE08F'); prog.setAttribute('stroke','#3BE08F'); prog.setAttribute('x2',995);
  dot.setAttribute('opacity','0'); glow.setAttribute('opacity','0');
  btn.style.display='none';
} else {
  setBtn();
  const io=new IntersectionObserver(es=>es.forEach(e=>{ if(e.isIntersecting){ loopPlay(); io.disconnect(); }}),{threshold:.5});
  io.observe(document.getElementById('hero'));
}
</script><script>(function(){var last=0;function H(){var d=document;return Math.max(d.documentElement.scrollHeight,(d.body?d.body.scrollHeight:0),(d.body?d.body.offsetHeight:0));}function P(){var h=H()+2;if(h>last){last=h;try{parent.postMessage({__salsaH:h},'*');}catch(e){}}}window.addEventListener('load',function(){P();setTimeout(P,300);setTimeout(P,1200);setTimeout(P,2500);});try{new ResizeObserver(P).observe(document.documentElement);}catch(e){}var n=0,iv=setInterval(function(){P();if(++n>12)clearInterval(iv);},1000);P();})();</script></body></html>
