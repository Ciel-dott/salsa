<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SALSA — Deployment reel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f5f6f8; --ink:#16181c; --muted:#5c6473; --faint:#8a92a2; --line:#e4e7ec;
    --indigo:#2c45c8; --green:#1f9d6b;
    --film:#121317; --film2:#1b1d23; --hole:#c9ced8;
    --disp:'Space Grotesk',system-ui,sans-serif; --mono:'Space Mono',monospace; --body:'Inter',system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--body);line-height:1.6;
    display:flex;align-items:center;justify-content:center;padding:40px 20px 48px;-webkit-font-smoothing:antialiased}
  .stage{width:100%;max-width:1000px}
  .head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin:0 0 18px}
  .eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:var(--indigo);margin:0 0 10px}
  h1{font-family:var(--disp);font-weight:700;font-size:clamp(22px,3.4vw,30px);letter-spacing:-.015em;margin:0}
  .note{color:var(--muted);font-size:14.5px;max-width:560px;margin:8px 0 0}
  .play-btn{flex:0 0 auto;display:inline-flex;align-items:center;gap:9px;font-family:var(--disp);font-weight:600;font-size:14px;
    color:#fff;background:var(--indigo);border:1px solid var(--indigo);border-radius:11px;padding:11px 18px;cursor:pointer;
    transition:transform .15s,box-shadow .15s}
  .play-btn:hover{transform:translateY(-1px);box-shadow:0 8px 22px -12px rgba(44,69,200,.55)}

  /* film strip */
  .reel{position:relative;background:var(--film);border-radius:14px;padding:24px 0;overflow:hidden;
    box-shadow:0 18px 44px -26px rgba(20,30,60,.3)}
  .holes{position:absolute;left:0;right:0;height:11px;
    background:repeating-linear-gradient(90deg,var(--hole) 0 11px,transparent 11px 30px)}
  .holes.top{top:6px} .holes.bottom{bottom:6px}
  .track{display:flex;gap:10px;width:max-content;padding:0 16px;animation:slide 48s linear infinite;will-change:transform}
  .reel:hover .track{animation-play-state:paused}
  @keyframes slide{from{transform:translateX(0)}to{transform:translateX(-50%)}}
  .frame{flex:0 0 auto;width:218px;height:124px;border-radius:7px;overflow:hidden;background:var(--film2);
    border:1px solid #2a2d34;position:relative;cursor:pointer}
  .frame img{width:100%;height:100%;object-fit:cover;display:block}
  .frame .lab{position:absolute;left:0;right:0;bottom:0;font-family:var(--mono);font-size:10px;letter-spacing:.06em;
    color:#aeb6c6;background:linear-gradient(transparent,rgba(0,0,0,.6));padding:14px 8px 5px}
  .frame .ix{position:absolute;top:6px;left:8px;font-family:var(--mono);font-size:10px;color:#7c869a}
  .frame .ph{position:absolute;inset:0;display:grid;place-items:center;color:#3a3f4b}
  .frame:hover{border-color:#3a4a8a}

  /* inline montage player */
  .player{position:relative;background:#0F141B;border-radius:14px;overflow:hidden;aspect-ratio:16/9}
  .player video{width:100%;height:100%;object-fit:contain;display:block;background:#0F141B}
  .player .pph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:#9aa3b2;text-align:center;padding:20px}
  .player .pph .play{width:54px;height:54px;border-radius:50%;border:1.5px solid #2a3550;display:grid;place-items:center}
  .player .pph .file{font-family:var(--mono);font-size:11.5px;color:#7c869a}
  .close{position:absolute;top:10px;right:10px;z-index:3;width:34px;height:34px;border-radius:50%;border:0;cursor:pointer;
    background:rgba(0,0,0,.5);color:#fff;font-size:16px;line-height:1}
  .frame .pl{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;cursor:pointer;background:rgba(8,9,11,.16);transition:background .15s}
  .frame .pl:hover{background:rgba(8,9,11,.32)}
  .frame.playing .pl{display:none}
  .reel.frozen .track{animation-play-state:paused}
  .hidden{display:none}
  .foot{font-family:var(--mono);font-size:11px;color:var(--faint);margin:14px 2px 0}
  @media (prefers-reduced-motion: reduce){.track{animation:none;overflow-x:auto}}
</style>
</head>
<body>
<div class="stage">
  <div class="head">
    <div>
      <p class="eyebrow">Deployment reel</p>
      <h1>Real-robot trials, scenario by scenario.</h1>
      <p class="note">A montage of the trials behind the numbers — narrow passages, frontal obstacles, pedestrians.</p>
    </div>
  </div>

  <!-- STRIP -->
  <div class="reel" id="reel">
    <div class="holes top"></div>
    <div class="track" id="track"></div>
    <div class="holes bottom"></div>
  </div>

  <p class="foot">Tap any frame to play it in place. The strip pauses while a clip plays.</p>
</div>

<script>
/* ====== EDIT HERE ======
   MONTAGE.src  -> your full montage .mp4 (e.g. 'clips/montage.mp4')
   FRAMES       -> thumbnails for the sliding strip. Set img to an image path
                   (e.g. 'clips/thumbs/01.jpg'). Optional clip: a per-frame .mp4
                   that plays in the montage player when the frame is clicked.
                   Leave img '' to keep numbered placeholders.                      */
const MONTAGE = { src:'', poster:'' };
const FRAMES = [
  { label:'Head-on encounter',   clip:'clips/head-on.mp4' },
  { label:'Dynamic interaction', clip:'clips/human-interaction.mp4' },
  { label:'Narrow passage',      clip:'clips/narrow.mp4' },
  { label:'Overtaking',          clip:'clips/safe-overtake.mp4' },
  { label:'Social clearance',    clip:'clips/social-aware.mp4' },
  { label:'Frontal obstacle',    clip:'clips/red-cone.mp4' },
  { label:'Obstacles on the fly',clip:'clips/suitcase.mp4' },
  { label:'Continuous avoidance',clip:'clips/two-obstacles.mp4' },
  { label:'Sudden appearance',   clip:'clips/sudden-appearance.mp4' },
];
/* ======================== */

const track=document.getElementById('track');
const reel=document.getElementById('reel');
function anyPlaying(){ return [...document.querySelectorAll('#track video')].some(v=>!v.paused&&!v.ended); }
function makeFrame(f,i){
  const d=document.createElement('div'); d.className='frame';
  d.innerHTML = '<video src="'+f.clip+'" muted playsinline preload="metadata" style="width:100%;height:100%;object-fit:cover;display:block"></video>'
    + '<div class="pl"><svg width="22" height="24" viewBox="0 0 22 24"><path d="M0 0 L22 12 L0 24 Z" fill="#fff"/></svg></div>'
    + '<span class="ix">'+String((i%FRAMES.length)+1).padStart(2,'0')+'</span>'
    + '<span class="lab">'+f.label+'</span>';
  const v=d.querySelector('video'), pl=d.querySelector('.pl');
  pl.onclick=()=>{
    document.querySelectorAll('#track video').forEach(o=>{if(o!==v)o.pause();});
    document.querySelectorAll('.frame.playing').forEach(fr=>fr.classList.remove('playing'));
    d.classList.add('playing'); reel.classList.add('frozen');
    v.controls=true; v.muted=true; v.play().catch(()=>{});
  };
  const stop=()=>{ d.classList.remove('playing'); v.controls=false; if(!anyPlaying()) reel.classList.remove('frozen'); };
  v.addEventListener('pause',stop); v.addEventListener('ended',stop);
  return d;
}
// duplicate the sequence so the marquee loops seamlessly (translateX -50%)
[...FRAMES, ...FRAMES].forEach((f,i)=>track.appendChild(makeFrame(f,i)));
</script>
<script>(function(){var lp=0;function H(){var d=document;return Math.max(d.documentElement.scrollHeight,(d.body?d.body.scrollHeight:0),(d.body?d.body.offsetHeight:0));}function P(){var h=H()+2;if(Math.abs(h-lp)>3){lp=h;try{parent.postMessage({__salsaH:h},'*');}catch(e){}}}window.addEventListener('load',function(){P();setTimeout(P,300);setTimeout(P,1200);});try{new ResizeObserver(P).observe(document.documentElement);}catch(e){}setInterval(P,1500);P();})();</script>
</body>
</html>
