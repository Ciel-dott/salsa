<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SALSA — The problem</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#f5f6f8;--ink:#16181c;--muted:#5c6473;--line:#e4e7ec;--coral:#E0473D;
    --disp:'Space Grotesk',system-ui,sans-serif;--mono:'Space Mono',monospace;--body:'Inter',system-ui,sans-serif}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--body);line-height:1.6;
    display:flex;justify-content:center;padding:40px 20px 28px;-webkit-font-smoothing:antialiased}
  .stage{width:100%;max-width:1040px}
  .eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--coral);margin:0 0 12px}
  h1{font-family:var(--disp);font-weight:700;font-size:clamp(22px,3.4vw,30px);letter-spacing:-.015em;margin:0 0 22px}
  .screen{position:relative;width:100%;aspect-ratio:16/9;background:#08090b;border-radius:14px;overflow:hidden;
    box-shadow:0 18px 44px -28px rgba(20,10,10,.5)}
  .screen video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;background:#08090b}
  .ph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;
    color:#7c869a;text-align:center;padding:24px;background:repeating-linear-gradient(45deg,#0c0d10 0 14px,#0a0b0e 14px 28px)}
  .ph .big{font-family:var(--disp);font-weight:700;font-size:clamp(16px,2.2vw,22px);color:#cdd3df}
  .ph .f{font-family:var(--mono);font-size:11.5px;color:#7c869a;letter-spacing:.04em}
</style>
</head>
<body>
<div class="stage">
  <p class="eyebrow">The problem · base policy</p>
  <h1>Four ways a base navigation VLA fails.</h1>
  <div class="screen">
    <video id="vid" autoplay muted loop playsinline preload="auto" style="display:none"></video>
    <div class="ph" id="ph">
      <div class="big">Your 2×2 failure montage</div>
      <div class="f">drop clip &#8594; clips/base_failures_2x2.mp4</div>
    </div>
  </div>
</div>
<script>
/* ====== EDIT HERE: your finished 2x2 video (autoplays muted + loops). ====== */
const FAIL = { src:'clips/finalnew.mp4', poster:'' };   // e.g. src:'clips/base_failures_2x2.mp4'
/* =========================================================================== */
var vid=document.getElementById('vid'), ph=document.getElementById('ph');
if(FAIL.src){ ph.style.display='none'; vid.style.display='block'; vid.src=FAIL.src; if(FAIL.poster)vid.poster=FAIL.poster; vid.play&&vid.play().catch(function(){}); }
</script>
<script>(function(){var lp=0;function H(){var d=document;return Math.max(d.documentElement.scrollHeight,(d.body?d.body.scrollHeight:0),(d.body?d.body.offsetHeight:0));}function P(){var h=H()+2;if(Math.abs(h-lp)>3){lp=h;try{parent.postMessage({__salsaH:h},'*');}catch(e){}}}window.addEventListener('load',function(){P();setTimeout(P,300);setTimeout(P,1200);});try{new ResizeObserver(P).observe(document.documentElement);}catch(e){}setInterval(P,1500);P();})();</script>
</body>
</html>
